on")?(n="DCF Tab 1 Row 9: Performance results drive Col 2 prize money. P1 finish = ~$100M from FOM. Confirm Constructors' trajectory.",i="Thesis Ch 1: 'On-track performance directly drives financial outcomes through the Column 2 prize structure.'",u="Use in counselor meeting: 'The team I'm studying just won \u2014 their financial results will reflect this in increased prize money.'"):l.includes("regulation")||l.includes("fia")||l.includes("cost cap")||l.includes("budget")?(n=`DCF Tab 4: Check if cost cap figure ($${a.tc}M) has changed. If new regulation, add sensitivity row for compliance impact.`,i="Thesis Ch 3: Update cost cap analysis. Any regulatory change affects EBITDA margins and operating leverage.",u="This is directly relevant to your capstone and Motorsports Essentials badge \u2014 regulatory knowledge differentiates you."):l.includes("valuation")||l.includes("billion")||l.includes("investment")||l.includes("stake")||l.includes("kurtz")?(n=`DCF Tab 1 Cell B3: Check if EV benchmark has changed from $${a.ev/1e3}B. Update sensitivity analysis.`,i="Thesis Ch 2: Update market valuation reference. Compare your independent DCF output to the new figure.",u="Key data point for your Graduate Programme application \u2014 shows you track real-time valuation changes."):l.includes("mercedes")||l.includes("brackley")||l.includes("wolff")||l.includes("antonelli")||l.includes("russell")?(n="Review for any financial implications \u2014 sponsor mentions, performance trends, or strategic decisions that affect revenue/costs.",i="Check if this development relates to any of your 6 thesis chapters. Mercedes-specific news often touches multiple chapters.",u="Stay current on team developments. Knowledge of recent events demonstrates genuine engagement in applications."):(n="Scan for financial implications. Any F1-wide change (new teams, rule changes, broadcast deals) can affect Mercedes' revenue.",i="Consider whether this fits into your thesis narrative. F1 industry trends provide context for Mercedes' position.",u="General F1 knowledge strengthens your profile. Note anything that could come up in interviews."),{dcf:n,th:i,nw:u}}var Sg=e=>{let t=[];return t.push({ph:1,wk:"Wk 1",th:"F1 Business Model",cl:s.teal,its:[{ty:"read",id:"w1-1",ti:"Acquired Podcast \u2014 Formula 1",bd:"A 3-4 hour podcast telling the full story of how F1 became a massive business. This is the best single resource to understand how F1 makes money. Listen in two sessions \u2014 it's long but fascinating.",lk:"https://www.acquired.fm/episodes/formula-1",cn:`After listening, you'll understand where Mercedes' $${e.rev}M in revenue actually comes from.`,an:[{mk:"Broadcasting Rights \u2014 How F1 Makes Most of Its Money",nt:"Think of it like the NFL's TV deal. F1 sells the right to broadcast races to TV networks around the world \u2014 ESPN in the US, Sky in the UK, and so on. This is the biggest single source of money for the whole sport. All that TV money goes to a company called FOM (Formula One Management), which is owned by Liberty Media. FOM then shares about half of it with the teams. This is important because it means when more people watch F1, MORE money flows to Mercedes. [Source: Acquired Podcast + Sportico Nov 2025 \u2014 see \u{1F4DA} Sources]",wh:"Later, when we build your spreadsheet model, this becomes a line called 'FOM Distributions' \u2014 basically Mercedes' share of the TV money. For now, just remember: TV deals = biggest money source for F1.",th:"For your thesis (which is basically a long research paper you'll write for your capstone class in Year 4), you'll eventually write about how F1 makes money. Save this note: 'F1 is basically a media business that happens to involve racing.'",nw:"Great talking point for your counselor meeting: 'F1 generates over $3 billion a year, mostly from TV rights, and shares about half with teams.'"},{mk:"Liberty Media Bought F1 for $4.4 Billion in 2017",nt:`Liberty Media is an American company that bought Formula 1 in 2017. Before them, F1 barely had social media \u2014 now it has over 800 million followers worldwide. Why does this matter? Because more fans = more eyeballs = sponsors are willing to pay MORE to put their logo on the car. That's a big reason Mercedes' revenue grew from around $300-400 million to $${e.rev}M. The Drive to Survive Netflix series? That was Liberty Media's idea, and it's part of why you're here right now. [Source: Acquired Podcast + Wikipedia 'Mercedes-Benz in Formula One' \u2014 \u{1F4DA} Sources]`,wh:"When we eventually build your spreadsheet, you'll need to estimate how fast Mercedes' revenue will grow each year. Liberty Media growing the fanbase is your main reason for picking a healthy growth number. For now, just note: 'Liberty Media grew F1's audience 2x, which drove team revenues up.'",th:"Future thesis note: 'Liberty Media's digital strategy since 2017 has been the main driver of team revenue growth.'",nw:"For your Graduate Programme application someday: understanding WHY F1 is growing shows you think about the business, not just the racing."},{mk:"The Concorde Agreement \u2014 F1's Rule Book for Money",nt:"The Concorde Agreement is a contract between F1 (FOM), the rule-makers (FIA), and all 10 teams. It decides how prize money gets divided up. The money is split into three 'columns': Column 1 gives every team an equal share (like participation trophies). Column 2 gives more money to teams that finish higher in the championship (so winning literally pays more). Column 3 is the big one \u2014 it's a special bonus that ONLY goes to Ferrari, Mercedes, and Red Bull. New teams like Cadillac can never get Column 3 money, no matter how well they do. This gives Mercedes an extra $30-50 million per year that most teams don't get. [Source: Sportico Nov 2025 + Acquired Podcast \u2014 \u{1F4DA} Sources]",wh:"This is one of the most important things to understand about Mercedes' finances. When we build your spreadsheet model later, Column 3 will be a guaranteed revenue line. For now, just remember: Mercedes gets paid more than most teams because of a special deal that new teams can never access.",th:"Save this for your thesis: 'The three-column prize structure gives Mercedes a permanent $30-50M annual advantage over newer teams.'",nw:"Powerful counselor meeting point: 'Mercedes has a contractual revenue advantage worth $30-50M per year that no new team can ever receive.'"}]},{ty:"read",id:"w1-2",ti:"Mercedes 2026 Season Launch",bd:"A 90-minute video where Mercedes reveals their 2026 car. But more importantly, pay attention to WHO is talking \u2014 these are the leaders of the company you want to work for. Write down their names and titles.",lk:"https://www.mercedesamgf1.com/news/mercedes-amg-f1-season-launch-2026-a-new-era-begins",cn:"You're learning the org chart \u2014 who runs what. This matters for your thesis and interviews.",an:[{mk:`${e.ceo} \u2014 CEO & Team Principal (The Boss)`,nt:"Toto Wolff runs the entire team. He's not an engineer or a former racing driver \u2014 he's a businessman and investor who bought his way into F1. His quote from this launch: 'We approach this next era with clear ambition, focused execution, and an uncompromising commitment to delivering results.' Memorize this quote. It shows he thinks like a businessperson, which is exactly the path you're following. [Source: Mercedes 2026 Season Launch + Motorsport.com Wolff biography \u2014 \u{1F4DA} Sources]",wh:"You don't need to do anything with this in a spreadsheet yet. Just know his name and that he's been CEO since 2013. When we build the model later, Wolff's stable leadership is one reason the team is valuable.",th:"When you eventually write your thesis, open it with this quote. It immediately shows your reader you know the subject personally. Save it somewhere you can find it.",nw:"Use this in your counselor meeting: 'Mercedes approaches this era with clear ambition and focused execution \u2014 and so do I.' It's memorable and shows you've done real research."},{mk:`${e.cto} \u2014 Chief Technical Officer (Runs Engineering)`,nt:`James Allison is in charge of designing and building the car at Brackley. He leads hundreds of engineers. Why should you care about him? Because if you become Head of Finance, you'd work directly with Allison to decide how to spend the team's $${e.tc}M budget. He asks for money for car development; you help decide where it goes. [Source: Mercedes Official Site + Season Launch \u2014 \u{1F4DA} Sources]`,wh:"For now, just remember: the CTO and the Head of Finance are partners. The CTO says 'I need money for this wing design,' and finance helps figure out if that fits within the budget. You'll model these costs later.",th:"Future thesis note: 'The CFO-CTO relationship is critical at Mercedes \u2014 finance enables engineering within the budget rules.'",nw:"In any interview, you can say: 'I understand that finance at a race team means working alongside engineering to optimize the budget.'"},{mk:`${e.hpp} \u2014 HPP Managing Director (Runs the Engine Factory)`,nt:`Here's something most people don't know: Mercedes actually has TWO factories. Brackley builds the car, and Brixworth (called HPP \u2014 High Performance Powertrains) builds the engine. They operate under TWO SEPARATE spending limits \u2014 $${e.tc}M for the car and $${e.pc}M+ for the engine. Most fans and even many applicants don't know Brixworth exists. Knowing this makes you stand out. [Source: FIA 2026 Financial Regulations + Mercedes Official Site \u2014 \u{1F4DA} Sources]`,wh:`Save this fact: Mercedes = two sites, two budgets. Brackley ($${e.tc}M) + Brixworth ($${e.pc}M+). Total spending is actually $${e.tc+e.pc}M+ before you even count excluded items. We'll use both numbers in your spreadsheet later.`,th:"Future thesis note: 'Mercedes operates two UK sites under two separate spending caps, creating a more complex financial picture than most analysts realize.'",nw:"This is your secret weapon in applications: 'I know Mercedes has two cost centers under two FIA caps \u2014 Brackley and Brixworth.' Almost no one applying for the Graduate Programme will mention Brixworth."}]},{ty:"doc",id:"w1-d",ti:"\u{1F4C4} Important Documents (Save These Links for Later)",docs:[{name:"Companies House \u2014 Mercedes-Benz Grand Prix Ltd",url:e.chUrl,notes:"This is like a public record of Mercedes' finances that the UK government requires them to file. Think of it as their financial report card. Company number 00787446. You don't need to read it yet \u2014 but bookmark this link. In a few weeks, we'll come back and pull real numbers from it to put into your spreadsheet model."},{name:"FIA 2026 Financial Regulations",url:e.fiaUrl,notes:"The FIA is the governing body of F1 (like the NFL commissioner's office). These rules set the spending limits \u2014 $${C.tc}M for the car, $${C.pc}M for the engine. Bookmark this. We'll reference specific sections when we get to Week 3 (Cost Cap). You don't need to read it now."},{name:"HBS Article: 'Number One in Formula One' (Elberse, 2022)",url:"https://hbr.org/2022/11/number-one-in-formula-one",notes:"A Harvard Business Review article about Wolff's leadership. HBR allows a few free articles per month \u2014 if you hit a paywall, try an incognito/private browser window. There's also a FREE research paper covering the same topic linked in your Sources tab. Bookmark for Week 4."},{name:"FREE: Wolff Leadership Case Study (ResearchGate)",url:"https://www.researchgate.net/publication/393579098",notes:"A free academic paper analyzing Wolff's leadership. Covers the same lessons as the HBS article. 100% free to download as PDF. Great backup source for your thesis."}]},{ty:"term",id:"w1-3",ti:"Constructors' Prize Fund \u2014 How Teams Get Paid",bd:"F1 shares about half its total revenue with teams. But it's not split equally \u2014 it goes through three 'columns':",dt:["Column 1 (Equal Share): Every team gets the same base amount. Like a participation payment \u2014 you get it just for being in F1.","Column 2 (Performance Bonus): The team that finishes first in the championship gets significantly more \u2014 about $30-50 million more than second place. This is why every race matters financially.","Column 3 (Legacy Bonus): This is the big secret. ONLY Ferrari, Mercedes, and Red Bull get this extra payment \u2014 worth about $30-50 million per year. It was negotiated in a special contract called the Concorde Agreement. New teams like Cadillac can NEVER access it, no matter how well they race. This is a permanent financial advantage. (Source: Sportico Nov 2025 + Acquired Podcast \u2014 \u{1F4DA} Sources)"],ml:`When we build your spreadsheet model, this becomes a line worth about $${e.rF}M total (Column 1 + 2 + 3 combined). For now, just remember: Mercedes gets paid more than most teams, and part of that is locked in permanently.`,tl:"Save this for your thesis: 'The three-column prize structure gives established teams like Mercedes a built-in $30-50M annual advantage that newer teams cannot access.'"},{ty:"quiz",id:"w1-q",qs:[{q:"F1 distributes approximately what percentage of total revenue to teams?",o:["~25%","~50%","~75%","~90%"],a:1,ex:`About 50% \u2014 half of all the money F1 makes gets shared with teams. The other half stays with FOM (the company that runs F1, owned by Liberty Media). F1 makes over $3 billion a year, so teams collectively get over $1.5 billion. Mercedes, as the top team, gets about $${e.rF}M from this pool. The important thing: when F1 grows (more fans, bigger TV deals), teams automatically get more money too. [Source: Sportico Nov 2025 \u2014 \u{1F4DA} Sources]`,ma:`Spreadsheet note for later: Mercedes' share of F1 prize money ($${e.rF}M) should grow as F1's total revenue grows.`},{q:"Column 3 legacy bonuses are received by which teams?",o:["All teams equally","Only the Constructors' champion","Ferrari, Mercedes, and Red Bull","The bottom 3 teams"],a:2,ex:"Only three teams get Column 3: Ferrari (who gets the most \u2014 over $100M), Mercedes (about $40-50M), and Red Bull (about $35-40M). This bonus was negotiated through special contracts and can never be accessed by new teams like Cadillac or Audi. It pays out every year regardless of how Mercedes finishes in the championship. Think of it like a guaranteed paycheck that most teams don't have. [Source: Sportico Nov 2025 + Acquired Podcast \u2014 \u{1F4DA} Sources]",ma:"Spreadsheet note for later: Column 3 (~$40M) is the most reliable part of Mercedes' income because it's guaranteed by contract."}]},{ty:"reflect",id:"w1-r",pr:"In 3-4 sentences, explain how F1 makes money and gets that money to teams like Mercedes. Try to answer: (1) where does the money originally come from? (2) how does it get shared with teams? (3) why does Mercedes get more than most teams? Try to include at least one specific number you learned.",ip:["TV/broadcasting rights are the biggest source of money for F1","Countries pay $25-75M each to host a race","About 50% of F1's money gets shared with teams through 3 'columns'","Column 3 gives Mercedes an extra ~$40M that new teams can never get","Sponsorship (like PETRONAS) makes up about 60% of what Mercedes earns directly"],fg:"The key insight: F1 as a whole makes money one way (TV deals, race hosting), but Mercedes as a TEAM makes money differently (sponsors, prize money from F1, parent company funding). Did you show you understand that difference?"},{ty:"brief",id:"w1-b",pr:`Imagine ${e.ceo} asks you in an elevator: 'So, how does our team actually make money?' You have 90 seconds. Practice saying this OUT LOUD \u2014 yes, actually speak. Time yourself.`,tp:[`Start with the big number: 'Mercedes brings in about $${e.rev} million a year from four main sources.'`,"Break it down simply: 'About 60% comes from sponsors like PETRONAS and Microsoft. About 25% comes from F1 prize money. About 10% comes from Mercedes-Benz the car company. And about 5% from merchandise and other stuff.'","Show you know the secret advantage: 'And here's something most people don't know \u2014 Mercedes is one of only three teams that gets a special legacy payment worth about $40 million a year. New teams like Cadillac can never get this.'","End forward-looking: 'And with F1's audience growing every year thanks to things like Drive to Survive, all these revenue streams should keep growing.'"]}]}),t.push({ph:1,wk:"Wk 2",th:`$${e.ev/1e3}B Valuation`,cl:s.teal,its:[{ty:"formula",id:"w2-f",ti:"Enterprise Value (EV) \u2014 Your First Finance Concept",cp:`When someone says 'Mercedes is worth $${e.ev/1e3} billion,' what do they actually mean? Enterprise Value is the total price you'd have to pay to buy the ENTIRE team \u2014 every building, every contract, every car, everything. It's like asking: 'If I wanted to buy Mercedes F1 from Toto Wolff, INEOS, and Mercedes-Benz, what's the total check I'd have to write?'`,fm:"EV = What the Owners' Shares Are Worth + Any Debt the Company Has",bk:[{p:"Owners' Shares (Equity)",m:`Since Mercedes F1 isn't on the stock market, we can't just look up a stock price. Instead, we look at real deals \u2014 like when George Kurtz recently bought about 5% of the team. The price he paid implied the whole team was worth about $${e.ev/1e3}B.`},{p:"Debt",m:"Any money the team owes. F1 teams actually don't have much debt because the spending rules limit how much they need to borrow."},{p:"Why YOU care about this",m:`Over the next four years, you're going to build a spreadsheet that calculates this number from scratch \u2014 using Mercedes' actual revenue, costs, and growth rates. Your goal is to arrive at your OWN estimate and see how it compares to the $${e.ev/1e3}B everyone else says. That's what financial analysts do for a living.`}],eg:`Here's a simple way to think about it: Mercedes makes about $${e.rev}M per year. Buyers paid $${e.ev/1e3}B for it. That means they paid ${e.mult} times the annual revenue. It's like paying $${e.mult.toFixed(0)} for a lemonade stand that makes $1 per year \u2014 because you believe it'll make more in the future. [Source: Sportico Nov 2025 \u2014 \u{1F4DA} Sources]`,ma:`When we start building your spreadsheet (Week 2 model steps), the first thing you'll type in is this $${e.ev/1e3}B number so you have a target to compare your own calculation against.`},{ty:"read",id:"w2-1",ti:"Forbes / F1i: F1 Team Valuations (Nov 2025)",bd:`Forbes and multiple free news sites publish annual rankings of how much every F1 team is worth. Mercedes is valued at about $${(e.ev/1e3).toFixed(1)} billion. These articles are FREE to read \u2014 unlike Sportico which requires an expensive subscription.`,lk:"https://f1i.com/news/556831-only-two-formula-1-teams-make-forbes-2025-top-50-list.html",cn:"This gives you the real-world number your future spreadsheet model will try to match.",an:[{mk:`Mercedes is #1 at about $${(e.ev/1e3).toFixed(1)} Billion`,nt:"This is what the market says Mercedes is worth right now. When you build your spreadsheet model over the coming months, you'll calculate your OWN estimate of what Mercedes is worth. Your number doesn't have to match exactly \u2014 if you get somewhere between $5 billion and $7 billion, that's reasonable. If your number comes out to $2 billion or $15 billion, something in your assumptions is probably off. The point isn't to guess the exact number \u2014 it's to build a logical argument for what YOU think the team is worth and explain why. [Source: Sportico Nov 2025 + F1 Oversteer \u2014 \u{1F4DA} Sources]",wh:`Bookmark this article. When we start building your spreadsheet, you'll type '$${e.ev/1e3}B' as the 'market benchmark' \u2014 the number you're trying to get close to (or explain why you're different).`,th:`Future thesis sentence to save: 'The November 2025 Sportico report values Mercedes-AMG Petronas at approximately $${(e.ev/1e3).toFixed(1)}B, making it the most valuable team in Formula 1.'`,nw:"In interviews someday: 'My model produces $X billion, which I can compare to the $${(C.ev/1000).toFixed(1)}B market valuation from the 2025 Kurtz transaction and Sportico report.'"},{mk:"Other Team Values (Your Comparison Group)",nt:`Write down these numbers \u2014 they're important later. Ferrari is worth about $4.8B, Red Bull about $4.3B, McLaren about $4.5B, Aston Martin about $2.7B. When you eventually argue that Mercedes is worth $${(e.ev/1e3).toFixed(1)}B, you need to explain why it's worth MORE than these other teams. The reasons: strongest brand, most diverse sponsors, Column 3 bonus, and they build their own engine. [Source: Sportico Nov 2025 + SGI Europe \u2014 \u{1F4DA} Sources]`,wh:"Save these numbers. Later in your spreadsheet, you'll create a 'comparison table' showing all the teams side by side. This helps prove your Mercedes number is reasonable.",th:"Future thesis section: 'Comparable team analysis shows Mercedes commands a premium valuation relative to peers.'",nw:""}]},{ty:"term",id:"w2-t",ti:"Revenue Breakdown \u2014 Know Every Dollar",bd:`Mercedes' ~$${e.rev}M annual revenue comes from four sources. You need to know the approximate size, source, and growth driver of each:`,dt:[`~${e.pS}% Sponsorship ($${e.rS}M+): PETRONAS title ($${e.sp[0].e}M/yr since ${e.sp[0].y}), Microsoft principal ($${e.sp[1].e}M since ${e.sp[1].y}), INEOS principal ($${e.sp[2].e}M since ${e.sp[2].y}), plus adidas, Monster, Marriott, others. Each deal has different terms, duration, and renewal probability.`,`~${e.pF}% FOM Distributions ($${e.rF}M+): The Col 1/2/3 payments. Dependent on Constructors' standing (P1 = maximum) + Col 3 legacy.`,`~${e.pP}% Parent Company ($${e.rP}M est.): Mercedes-Benz AG pays for brand association, technology transfer, and shared services.`,`~${e.pO}% Other ($${e.rO}M): Merchandise (adidas partnership), hospitality, licensing, track-day experiences.`],ml:`DCF Tab 1: Four rows summing to ${e.rev}. Each row sourced: 'Industry estimates, Sportico Nov 2025.'`},{ty:"quiz",id:"w2-q",qs:[{q:`At $${e.rev}M revenue and $${e.ev/1e3}B EV, Mercedes' EV/Revenue multiple is:`,o:["~3.2x","~5.1x",`~${e.mult}x`,"~12x"],a:2,ex:`$${e.ev}M \xF7 $${e.rev}M = ${e.mult}x. This is above the F1 average (~6x) because Mercedes has the strongest brand, most diversified sponsor base, Column 3 legacy payments, and dual-site PU manufacturing IP. Your thesis should explain WHY the premium exists. [Source: Sportico Nov 2025 + F1 Oversteer \u2014 \u{1F4DA} Sources]`,ma:`DCF Tab 1: After your model outputs an EV, divide by $${e.rev}M. Range of 5-9x = reasonable. Outside that range = revisit assumptions.`}]},{ty:"sim",id:"w2-s",ti:"\u{1F3ED} First Day in FP&A at Brackley",sc:`You just started as a Finance Graduate at Mercedes-AMG Petronas. The Head of Finance needs a 2026 revenue estimate for ${e.ceo} by end of day. This is your first real task.`,st:[{t:"Find the Baseline",pr:`What was Mercedes' total revenue in ${e.revS.split(" ")[1]||"2024"}?`,h:"Sportico article.",o:["$410M","$620M",`$${e.rev}M`,"$1.1B"],c:2,fb:`$${e.rev}M \u2014 the highest of any F1 team. This is ALWAYS your starting point for any forecast: last year's actual number.`},{t:"Apply Growth",pr:"At 8% growth, what's the 2026 projection?",h:`$${e.rev}M \xD7 1.08`,o:["$841M",`$${Math.round(e.rev*1.08)}M`,"$894M","$920M"],c:1,fb:`$${Math.round(e.rev*1.08)}M. This is a top-line growth estimate. Your full model (Tab 3) will build this bottom-up by sponsor, but for a quick number to get ${e.ceo} something by EOD, this works.`},{t:"Present to Your Boss",pr:"Draft a one-sentence summary: the number, the assumption behind it, and one risk.",h:"Structure: number \u2192 methodology \u2192 risk flag.",tx:!0,id_:`We estimate 2026 revenue at approximately $${Math.round(e.rev*1.08)}M, assuming 8% growth consistent with Liberty Media's post-2017 trajectory, with downside risk concentrated in PETRONAS renewal timing.`,fb:"Clean executive communication: confident number, transparent assumption, honest risk. No hedging with 'I think maybe.' State it and own it. This is how analysts at Brackley communicate."}]},{ty:"model",id:"w2-m",ti:"\u{1F4CA} Build Your DCF: Tab 1 \u2014 Assumptions",tc:`A DCF (Discounted Cash Flow) model calculates what a company is worth TODAY based on how much cash it will generate in the FUTURE. Here's the simplest analogy: if a friend says 'I'll pay you $100 every year for the next 10 years,' would you pay $1,000 for that deal? No \u2014 because $100 ten years from now is worth LESS than $100 today (you could invest today's money and earn interest). A DCF figures out the exact fair price by converting each future payment into today's dollars. Your model will forecast Mercedes' future cash flows, discount them back, and arrive at an enterprise value. If your number is near $${e.ev/1e3}B, the market is pricing correctly.`,sp:["Open Excel. Rename Tab 1 to 'Assumptions.'","A1: 'Mercedes-AMG Petronas F1 \u2014 DCF Model' (bold, size 14)",`A3: 'Enterprise Value (Market)' | B3: '${e.ev}' ($M) | C3: 'Source: ${e.evS}'`,`A4: 'Revenue (${e.revS.split(" ")[1]||"2024"})' | B4: '${e.rev}' | C4: 'Source: ${e.revS}'`,`A5: 'EV/Revenue Multiple' | B5: '=B3/B4' \u2192 should show ${e.mult}x | C5: 'Calculated'`,"A7: 'REVENUE BREAKDOWN' (bold, underlined)",`A8: 'Sponsorship' | B8: '${e.rS}' | C8: '~${e.pS}%. ${e.sp.map(a=>a.n).join(", ")}, others.'`,`A9: 'FOM Distributions' | B9: '${e.rF}' | C9: '~${e.pF}%. Col1+Col2(P1)+Col3(legacy).'`,`A10: 'Parent (MB)' | B10: '${e.rP}' | C10: '~${e.pP}%. Brand + tech transfer.'`,`A11: 'Other' | B11: '${e.rO}' | C11: '~${e.pO}%. Merchandise, hospitality.'`,`A12: 'TOTAL REVENUE' | B12: '=SUM(B8:B11)' \u2192 ${e.rev}. If this matches, Tab 1 is working!`]}]}),t.push({ph:1,wk:"Wk 3",th:"Cost Cap Economics",cl:s.teal,its:[{ty:"formula",id:"w3-f",ti:"EBITDA \u2014 Why F1 Teams Became Investable",cp:"EBITDA measures operating profitability. Pre-cost-cap (before 2021): F1 teams spent every dollar \u2192 0% margin \u2192 not investable. Post-cap: revenue grows while costs are capped \u2192 15-25% margins appeared \u2192 valuations doubled. This is the single most important insight in your thesis.",fm:"EBITDA = Revenue \u2212 Operating Expenses",bk:[{p:"Pre-cap",m:"Rev $500M, costs $500M, EBITDA $0."},{p:"Post-cap",m:`Rev $${e.rev}M, costs ~$415M \u2192 meaningful margin.`},{p:"Operating leverage",m:"Revenue grows, costs CAPPED \u2192 extra = pure profit. Most powerful concept in your thesis."}],eg:`$${e.rev}M \u2212 ~$600M = ~$212M \u2248 26% margin. This margin DID NOT EXIST before 2021. [Source: Companies House + FIA Regs \u2014 \u{1F4DA} Sources]`,ma:"DCF Tab 4: Revenue (from Tab 1) minus Total Operating Costs = EBITDA. This feeds your FCF calculation, which feeds the DCF valuation."},{ty:"term",id:"w3-t",ti:"Cost Cap Architecture",bd:"Not one number \u2014 a system:",dt:[`Team: $${e.tc}M (Brackley). The $145\u2192$215M increase was accounting reclassification (depreciation moved inside), NOT more spending.`,`PU: $${e.pc}M+ (Brixworth). Separate cap for engine development.`,`Excluded: ${e.exc}. Adds $100-200M+ to real spending.`,`Real total: $${e.rs}M+. (Source: FIA 2026 Regs + Companies House \u2014 \u{1F4DA} Sources)`],ml:`DCF Tab 4: Two sections \u2014 'Inside Cap' ($${e.tc}M) and 'Outside Cap' (est $150-200M). Sum = Total Operating Costs.`,tl:"Ch 3: 'The cost cap's financial impact is not the spending limit itself, but the predictable EBITDA margins it created \u2014 transforming F1 teams from money-losing passion projects into investable enterprises.'"},{ty:"quiz",id:"w3-q",qs:[{q:`The $145M to $${e.tc}M cap increase was caused by:`,o:["F1 allowing more spending","Inflation","Accounting reclassification","Team lobbying"],a:2,ex:"Depreciation was moved from 'excluded' to 'included.' The dollar amount teams actually spend DID NOT CHANGE. This is the kind of technical nuance that separates a sophisticated analyst from someone who reads headlines. [Source: FIA 2026 Financial Regulations \u2014 \u{1F4DA} Sources]",ma:`Tab 4 footnote: 'The ${e.tc}M cap includes depreciation previously excluded. Comparable 2025 figure would be ~$${e.tc}M, not $145M. No real spending increase.'`}]},{ty:"thesis",id:"w3-th",tc:"A thesis ARGUES something with evidence. You're not describing the cost cap \u2014 you're arguing it CAUSED valuations to increase by creating profit margins.",pr:"Write 300-500 words: How did the FIA cost cap create EBITDA margins that transformed F1 teams from money-losing operations into investable enterprises? Include at least 2 specific numbers from your learning.",hn:["Pre-2021: 100% of revenue spent on the car","Cap introduced: $145M (2021) \u2192 $${C.tc}M (2026, reclassified)","Mechanism: revenue uncapped + costs capped = margin","Numbers: $${C.rev}M revenue \u2212 $400M costs = meaningful EBITDA","Result: $2.4B (2020) \u2192 $${C.ev/1000}B (2025) = 20.1% CAGR","Big picture: F1 teams became 'alternative assets' comparable to NBA franchises"]}]}),t.push({ph:1,wk:"Wk 4",th:`${e.ceo}: Finance \u2192 F1`,cl:s.teal,its:[{ty:"read",id:"w4-1",ti:"Wolff Leadership Article (HBR or Free ResearchGate Version)",bd:"A study of how Toto Wolff leads Mercedes. The Harvard Business Review version may require a subscription \u2014 if so, use the FREE ResearchGate paper instead (link in your Sources tab). Both cover the same 6 leadership lessons.",lk:"https://hbr.org/2022/11/number-one-in-formula-one",cn:"The most respected academic source on Wolff's leadership. You'll cite this in your thesis.",an:[{mk:"Wolff Thinks Like an Owner, Not Just a Manager",nt:"The biggest takeaway: every decision Wolff makes \u2014 which drivers to hire, how much to invest in the car, which partners to bring in \u2014 comes down to money and value creation. He bought into Williams in 2009 as an investor. He bought into Mercedes in 2013 as an investor AND took the CEO role. He brought INEOS in 2020 as a partner. He sold a piece to Kurtz in 2025 at a huge profit. Every move was a business deal first. This is exactly why your Finance degree is the right path \u2014 Wolff proves that the money person can run the whole show. [Source: Elberse HBR 2022 + Motorsport.com + Race Sundays \u2014 \u{1F4DA} Sources]",wh:`Save this insight: Wolff's track record of smart financial decisions is one reason Mercedes is worth $${e.ev/1e3}B. When we build your model, stable leadership makes the team more valuable.`,th:"This is the foundation of your thesis Chapter 5. The argument: Wolff's investment background was THE key to Mercedes' success. Save the 6 leadership lessons and connect each one to a financial decision.",nw:"In your Graduate Programme application: 'My finance education mirrors the investment-first mindset that defines Mercedes' leadership under Wolff.'"}]},{ty:"listen",id:"w4-2",ti:"The Distillation of Toto Wolff Podcast",bd:`Full career arc: Vienna tech investor \u2192 Deutsche Telekom sale \u2192 Williams F1 (2009) \u2192 Mercedes CEO (2013) \u2192 8 consecutive titles \u2192 $${e.ev/1e3}B valuation (2025).`,lk:"https://whatgotyouthere.com/the-distillation-of-toto-wolff/",cn:"His finance background IS your career template."},{ty:"action",id:"w4-a",ti:"REHEARSE Counselor Meeting Script",bd:"May 14 is approaching. Read the full script from the meeting package TWICE. Practice the three requests out loud. Print all documents. This is the launch point."},{ty:"sim",id:"w4-s",ti:"\u{1F3ED} The Counselor Meeting Simulation",sc:"May 14, 2026. Northwood academic counselor's office. 25 minutes. They have never heard of the Mercedes Finance Graduate Programme.",st:[{t:"Your Opening",pr:"The counselor says: 'So, what brings you in today?' What do you say?",h:"Set the agenda immediately. Give a number. Be specific.",tx:!0,id_:`Thank you for meeting with me. I've mapped out a complete four-year plan for my Finance BBA and MBA, and I have three specific requests. My career goal is to work in finance for Mercedes-AMG Petronas, a Formula 1 team currently valued at approximately $${e.ev/1e3} billion. Can I walk you through my plan?`,fb:"Notice the structure: gratitude \u2192 agenda-setting ('three specific requests') \u2192 credibility marker ('$${C.ev/1000} billion') \u2192 clear ask. This is executive communication."},{t:"Handle the Pushback",pr:"The counselor says: 'That's ambitious. But why would a British racing team hire someone from a small Michigan university?'",h:"Give three structured reasons with specific evidence.",tx:!0,id_:"Three reasons: First, I'm building a live financial valuation model of the team using their actual UK corporate filings \u2014 no other applicant will have that. Second, Northwood's new Motorsports Management concentration gives me unique dual Finance + Motorsports credentials. Third, my planned Fall 2028 semester in Germany puts me within driving distance of Mercedes-Benz headquarters in Stuttgart.",fb:"Structured (three numbered reasons), evidence-based (the model, the concentration, the semester), and confident without arrogance. This is how you handle objections in any professional setting."}]},{ty:"quiz",id:"w4-q",qs:[{q:`${e.ceo}'s career before F1 was primarily in:`,o:["Automotive engineering","Corporate law","Technology investment and finance","Professional racing"],a:2,ex:"Wolff was a technology investor and financier in Vienna \u2014 not an engineer or racing driver. He sold a zero-revenue tech company to Deutsche Telekom for hundreds of millions, then exited 9 other investments before the dot-com crash. Your Finance BBA/MBA puts you on the exact same skillset path. [Source: Motorsport.com + Race Sundays \u2014 \u{1F4DA} Sources]",ma:"Thesis Introduction: 'Just as ${C.ceo}'s investment background enabled a finance-first approach to team leadership, this analysis applies the same analytical rigor to Mercedes' enterprise valuation.'"},{q:"Mercedes' ownership structure as of 2025:",o:["100% Mercedes-Benz","50/50 MB and Wolff",`${e.own.map(a=>a.p+"%").join(" / ")}`,"50/50 INEOS and Wolff"],a:2,ex:`The ${e.own.length}-way split creates complex governance: ${e.own[0].n} wants brand value, ${e.own[1].n} wants financial ROI, ${e.own[2].n} wants competitive success, ${e.own[3].n} is a strategic investor. Understanding stakeholder dynamics is essential for the finance function \u2014 the CFO serves all of them. [Source: Sportico Nov 2025 + Motorsport.com \u2014 \u{1F4DA} Sources]`,ma:"DCF Tab 1: Add ownership section showing each stakeholder, their %, and strategic priority. This helps explain why decisions balance brand, returns, and performance."}]},{ty:"thesis",id:"w4-th",tc:"This chapter argues that Wolff's investment background was THE key differentiator in building Mercedes into the most valuable F1 team. Every leadership decision was a financial decision first.",pr:`Write 300-500 words: How did ${e.ceo}'s investment background shape his leadership at Mercedes? Cover: Williams investment (2009), Mercedes buy-in (2013), INEOS deal (2020), Kurtz sale (2025). Each transaction should get its own paragraph.`,hn:["Williams 2009: Entered F1 as an INVESTOR, not a manager \u2014 set the pattern","Mercedes 2013: Combined ownership with operational control","INEOS 2020: Brought in strategic partner while maintaining position","Kurtz 2025: Realized return while retaining majority influence","Net worth ~$1.6B: Built through ownership, not salary"]}]}),[{ph:2,wk:"Wk 5-10",th:"Financial Foundations",its:[{ty:"read",id:"p2-1",ti:"'Financial Intelligence' by Berman & Knight",bd:"Beginner financial statements. 280p.",lk:"https://www.amazon.com/Financial-Intelligence-Revised-Managers-Knowing/dp/1422144119",cn:"Required before Companies House."},{ty:"read",id:"p2-2",ti:"'Little Book of Valuation' by Damodaran",bd:"DCF methodology. 200p.",lk:"https://www.amazon.com/Little-Book-Valuation-Company-Profit/dp/1118004779",cn:"Your DCF methodology source."},{ty:"model",id:"p2-m",ti:"\u{1F4CA} Tab 2: Historical Financials",tc:"3 years of Companies House data.",sp:["Revenue","COGS","OpEx","EBITDA","Net Income","CapEx"]}]},{ph:3,wk:"Wk 11-16",th:"F1 Deep Knowledge",its:[{ty:"term",id:"p3-1",ti:"2026 PU Architecture",bd:`ICE+MGU-K(350kW)+ES. No MGU-H. 50/50. PU cap: $${e.pc}M.`,dt:["350kW MGU-K (3\xD7 increase)","Sustainable fuel","Active aerodynamics"],ml:"Tab 1: Two cost centers."},{ty:"term",id:"p3-2",ti:"Sponsor Tiers",bd:`${e.pS}%+ from:`,dt:e.sp.map(a=>`${a.n}: $${a.e}M (${a.t} since ${a.y})`),ml:"Tab 3: Sponsor-by-sponsor."}]},{ph:4,wk:"Fall 26-Spr 27",th:"Year 1 Applied",its:[{ty:"model",id:"p4-m",ti:"\u{1F4CA} Tab 4: Cost & EBITDA",tc:`Cap($${e.tc}M)+Excluded\u2192EBITDA.`,sp:[`Inside: $${e.tc}M`,"Outside: ~$150-200M",`Total: ~$${e.rs}M`,"EBITDA: Rev\u2212Total"]}]},{ph:5,wk:"Fall 27-Spr 28",th:"Advanced Finance",its:[{ty:"term",id:"p5-1",ti:"WACC Calculation",bd:`~${e.wacc}% estimate. CAPM: Rf+\u03B2\xD7MRP.`,dt:["Cost of equity via CAPM","After-tax cost of debt","Capital structure weights"],ml:"Tab 5: WACC."}]},{ph:6,wk:"Fall 28",th:"Germany Semester",its:[{ty:"action",id:"p6-1",ti:"Stuttgart + Brackley",bd:"Visit MB HQ. Tour Brackley. Network."},{ty:"thesis",id:"p6-t",tc:"Ch 6: Personal narrative.",pr:"Germany experience \u2192 Mercedes connection.",hn:["Cultural immersion","MB parent","European finance"]}]},{ph:7,wk:"Fall 29",th:"MBA + Apply",its:[{ty:"action",id:"p7-1",ti:"APPLY: Mercedes Graduate",bd:"Finance Graduate at Brackley. HPP Finance at Brixworth. Inspire at Stuttgart."}]},{ph:8,wk:"Spr 30",th:"Graduate",its:[{ty:"action",id:"p8-1",ti:"Capstone Defense + Transition",bd:"Defend thesis. Accept offer. Begin at Brackley. Finance Graduate \u2192 FP&A \u2192 Director \u2192 Head of Finance \u2192 CFO."}]}].forEach(a=>t.push({...a,cl:a.ph%2?s.teal:"#b8b8cc"})),t},Tg=e=>[{f:"Enterprise Value",b:`Equity+Debt. ~$${e.ev/1e3}B.`,c:"Val",lv:1,dp:"Full price tag to buy Mercedes."},{f:`EV/Rev (${e.mult}x)`,b:`$${e.ev}\xF7$${e.rev}M.`,c:"Val",lv:1,dp:"Premium: brand+Col3+sponsors."},{f:"WACC",b:`~${e.wacc}%. Discount rate.`,c:"Fin",lv:2,dp:"What investors require. CAPM-based."},{f:"FCF",b:"OpCF\u2212CapEx.",c:"Fin",lv:2,dp:"EBITDA\u2212Taxes\u2212WC\u2212CapEx. Discount this."},{f:"EBITDA",b:"Rev\u2212OpEx. 0\u219225%.",c:"Fin",lv:1,dp:"THE change. Cost cap made F1 investable."},{f:"Terminal Value",b:"FCF/(WACC\u2212g). 60-80%.",c:"Val",lv:3,dp:"Small g changes=hundreds of millions."},{f:`Cap ($${e.tc}M)`,b:`PU $${e.pc}M+.`,c:"Reg",lv:1,dp:"Real: $${C.rs}M+. Reclassification."},{f:"Col 1/2/3",b:"~50%: eq+perf+legacy.",c:"Rev",lv:1,dp:"Col3=$30-50M+ Merc/Ferrari/RB only."},{f:`PETRONAS ($${e.sp[0]?.e}M)`,b:"Title+Technical.",c:"Sp",lv:1,dp:"~8% from one=concentration risk."},{f:"CAGR",b:"(End/Start)^(1/n)\u22121.",c:"Fin",lv:2,dp:"$2.4\u2192$6B in 5yr=20.1%. Double S&P."},{f:"Sensitivity",b:"3\xD73 assumption table.",c:"Mod",lv:3,dp:"Honest range. Shows intellectual rigor."},{f:"Brackley+Brixworth",b:"Two sites, two caps.",c:"Ops",lv:1,dp:"PU=hidden value. 1 of 4 manufacturers."}],Yh=[{id:"m1",lb:"May 14 Counselor",dt:"2026-05-14",it:["Script printed","1-pager printed","Roadmap printed","Practice done","DCF printed","Badge prep"]},{id:"m2",lb:"Phase 1 Done",dt:"2026-05-11",it:["Acquired done","Launch watched","Quizzes passed","Tab 1 built"]},{id:"m3",lb:"DCF v1",dt:"2026-06-22",it:["Tabs 1-2 done","Rev verified","Advisor reviewed"]},{id:"m4",lb:"Fall 26",dt:"2026-08-25",it:["ACC enrolled","Badge confirmed","FANU joined"]},{id:"m5",lb:"DCF v2",dt:"2027-06-01",it:["Sensitivity done","Comps table"]},{id:"m6",lb:"Germany",dt:"2028-08-01",it:["Semester confirmed","Stuttgart planned"]},{id:"m7",lb:"Apply",dt:"2029-10-01",it:["Application done","Mocks done"]},{id:"m8",lb:"Graduate",dt:"2030-05-15",it:["Defended","Offer accepted"]}],Fh=[{id:"c1",n:1,t:"F1 Business Model"},{id:"c2",n:2,t:"Valuation Methodology"},{id:"c3",n:3,t:"Cost Cap Economics"},{id:"c4",n:4,t:"Ownership & M&A"},{id:"c5",n:5,t:"Wolff Leadership"},{id:"c6",n:6,t:"My Path"}],Mg=[{y:1,l:"Foundation",p:"Fall 26\u2013Spr 27",a:"ACC,MTH,MKT,Motorsports",x:"FANU,Cauley",c:"DCF v1"},{y:2,l:"Intermediate",p:"Fall 27\u2013Spr 28",a:"FIN 3010/3020,Stats",x:"Internship",c:"DCF v2"},{y:3,l:"Germany",p:"Fall 28\u2013Spr 29",a:"Germany,Capstone",x:"Stuttgart",c:"DCF v3"},{y:4,l:"MBA+Apply",p:"Fall 29\u2013Spr 30",a:"MBA,Defense",x:"Apply",c:"Graduate"}],Lh=[{l:"DTS Fan",p:0},{l:"Business Student",p:15},{l:"Financial Modeler",p:30},{l:"DCF Builder",p:45},{l:"Capstone Researcher",p:60},{l:"Graduate Ready",p:75},{l:"Brackley Finance",p:90},{l:"Future CFO",p:100}],zg=`@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');
