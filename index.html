// ============================================================================
// UPCOMING MILESTONES — Auto-surfaces milestone roadmap items near their dates
// ============================================================================

function UpcomingMilestones({ onNavigate }) {
  const today = new Date();

  // Find all milestone phases, calculate days away, filter to those within the next 365 days
  // If no milestone is within a year, still show the nearest milestone regardless of how far away
  const milestones = ROADMAP.filter(p => p.milestone).map(p => {
    const deadline = new Date(p.deadline);
    const daysAway = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));
    return { ...p, daysAway, deadline };
  }).filter(p => p.daysAway > -30); // exclude milestones more than 30 days past

  milestones.sort((a, b) => a.daysAway - b.daysAway);

  if (milestones.length === 0) return null;

  // Show top 2 upcoming
  const shown = milestones.slice(0, 2);

  return React.createElement('div', { className: 'mb-6' },
    React.createElement('div', {
      className: 'text-[10px] uppercase tracking-[0.2em] text-amber-400 font-semibold mb-2'
    }, 'Upcoming Milestones'),
    React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-3' },
      ...shown.map(m => {
        // Determine urgency styling
        const isImminent = m.daysAway <= 60 && m.daysAway >= 0;
        const isNow = m.daysAway <= 7 && m.daysAway >= -7;

        return React.createElement('button', {
          key: m.phase,
          onClick: () => onNavigate('course'),
          className: `text-left bg-gradient-to-br border rounded-xl p-4 transition-colors ${
            isNow ? 'from-amber-500/20 to-orange-500/20 border-amber-400/60 hover:border-amber-300' :
            isImminent ? 'from-amber-500/10 to-amber-900/10 border-amber-500/40 hover:border-amber-400/50' :
            'from-slate-900/50 to-slate-900/30 border-slate-800 hover:border-slate-700'
          }`
        },
          React.createElement('div', { className: 'flex items-center justify-between mb-2' },
            React.createElement('div', {
              className: 'text-[10px] uppercase tracking-wider font-bold text-amber-400'
            }, 'Milestone ' + m.phase),
            React.createElement('div', {
              className: `text-xs font-semibold ${
                isNow ? 'text-amber-200' :
                isImminent ? 'text-amber-300' :
                'text-slate-400'
              }`
            },
              m.daysAway < 0 ? `${Math.abs(m.daysAway)} days ago` :
              m.daysAway === 0 ? 'TODAY' :
              `${m.daysAway} days away`
            )
          ),
          React.createElement('div', { className: 'font-semibold text-slate-100 text-sm mb-1' }, m.name),
          React.createElement('div', { className: 'text-xs text-slate-400' },
            m.items[0] || 'See Roadmap for details')
        );
      })
    )
  );
}

function ValuationDCF() {
  // Defaults anchored to Mercedes 2024 filing
  const [inputs, setInputs] = useState({
    baseRev: 636,           // £M 2024 filed
    revGrowth: 8,           // % annual
    ebitMargin: 25.3,       // % (160.6 / 636)
    taxRate: 25,            // % UK corporate
    wacc: 11,               // % discount rate
    terminalGrowth: 3,      // %
    projYears: 5
  });

  const updateInput = (key, value) => {
    setInputs({ ...inputs, [key]: parseFloat(value) || 0 });
  };

  // DCF calculation — fully live
  const dcf = useMemo(() => {
    const { baseRev, revGrowth, ebitMargin, taxRate, wacc, terminalGrowth, projYears } = inputs;
    const projections = [];
    let rev = baseRev;

    for (let y = 1; y <= projYears; y++) {
      rev = rev * (1 + revGrowth / 100);
      const ebit = rev * (ebitMargin / 100);
      const nopat = ebit * (1 - taxRate / 100);
      const discount = Math.pow(1 + wacc / 100, y);
      const pv = nopat / discount;
      projections.push({ year: y, rev, ebit, nopat, pv, discount });
    }

    const terminalNopat = projections[projYears - 1].nopat * (1 + terminalGrowth / 100);
    const terminalValue = terminalNopat / ((wacc - terminalGrowth) / 100);
    const terminalPV = terminalValue / projections[projYears - 1].discount;

    const sumOfProjectedPVs = projections.reduce((a, b) => a + b.pv, 0);
    const enterpriseValue = sumOfProjectedPVs + terminalPV;

    // Convert to USD for comparison to Forbes/Sportico
    const gbpToUsd = 1.27; // approximate
    const evUsdB = (enterpriseValue * gbpToUsd) / 1000;

    return {
      projections,
      terminalPV,
      sumOfProjectedPVs,
      enterpriseValue,
      evUsdB,
      kurtzImplied: 6.0,
      sporticoEstimate: 5.88,
      forbesEstimate: 6.0
    };
  }, [inputs]);

  const inputControls = [
    { key: 'baseRev', label: 'Base revenue (£M, 2024 filed)', min: 400, max: 800, step: 10, unit: '£M' },
    { key: 'revGrowth', label: 'Revenue growth rate (%)', min: 0, max: 20, step: 0.5, unit: '%' },

    { key: 'taxRate', label: 'Tax rate (%)', min: 15, max: 35, step: 0.5, unit: '%' },
    { key: 'wacc', label: 'WACC / discount rate (%)', min: 6, max: 18, step: 0.25, unit: '%' },
    { key: 'terminalGrowth', label: 'Terminal growth (%)', min: 0, max: 6, step: 0.25, unit: '%' },
    { key: 'projYears', label: 'Projection years', min: 3, max: 10, step: 1, unit: 'yrs' }
  ];

  return React.createElement('div', null,
    React.createElement(SectionHeader, {
      eyebrow: 'Valuation Workshop',
      title: 'Mercedes F1 DCF — Live Working Model',
      subtitle: 'Every input adjustable. Every calculation live. Benchmark against Kurtz transaction and Forbes/Sportico.'
    }),

    React.createElement(InfoBanner, { type: 'success', title: 'Working Math, Not Theater' },
      'V15 claimed to have an Excel-based DCF but showed no actual computation. This model computes in real-time. Adjust any input below; all projections, terminal value, and enterprise value recalculate. Compare your result to the $6B Kurtz transaction print.'
    ),

    // Benchmarks
    React.createElement('div', { className: 'grid grid-cols-3 gap-3 mb-6' },
      React.createElement(StatTile, {
        label: 'Your DCF',
        value: dcf.evUsdB.toFixed(2),
        unit: '$B',
        caption: 'Live calculation',
        grade: 'A'
      }),
      React.createElement(StatTile, {
        label: 'Kurtz Transaction',
        value: '$6.0',
        unit: 'B',
        caption: 'November 2025 benchmark',
        grade: 'A'
      }),
      React.createElement(StatTile, {
        label: 'Forbes / Sportico 2025',
        value: '$5.88-6.0',
        unit: 'B',
        caption: 'Industry estimates',
        grade: 'A'
      })
    ),

    React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' },
      // Inputs panel
      React.createElement(Card, { title: 'Inputs', subtitle: 'Drag sliders — DCF recomputes instantly' },
        React.createElement('div', { className: 'space-y-4' },
          ...inputControls.map(c => React.createElement('div', { key: c.key },
            React.createElement('div', { className: 'flex items-center justify-between mb-1' },
              React.createElement('label', { className: 'text-xs text-slate-400' }, c.label),
              React.createElement('span', { className: 'text-sm font-semibold text-teal-400' },
                `${inputs[c.key]}${c.unit}`)
            ),
            React.createElement('input', {
              type: 'range',
              min: c.min,

              step: c.step,
              value: inputs[c.key],
              onChange: (e) => updateInput(c.key, e.target.value),
              className: 'w-full accent-teal-400'
            })
          ))

      // Output panel
      React.createElement(Card, { title: 'DCF Output' },

function SourceChecker() {
  const [text, setText] = useState('');
  const [results, setResults] = useState(null);

  const checkSources = () => {
    const checks = [];

    // Check for Companies House references
    const chMatch = text.match(/#?\b(\d{8})\b/g);
    if (chMatch) {
      chMatch.forEach(m => {
        const num = m.replace('#', '');
        const knownCH = {
          '00787446': { team: 'Mercedes-Benz Grand Prix Ltd', valid: true },
          '01760288': { team: 'Mercedes AMG HPP Ltd', valid: true },
          '01517478': { team: 'McLaren Racing Ltd', valid: true },
          '03120645': { team: 'Red Bull Racing Ltd', valid: true },
          '13814807': { team: 'AMR GP Holdings Ltd', valid: true },
          '01806337': { team: 'Alpine Racing Ltd', valid: true },
          '01297497': { team: 'Williams Grand Prix Engineering Ltd', valid: true }
        };
        if (knownCH[num]) {
          checks.push({ type: 'success', msg: `✓ Companies House #${num} matches ${knownCH[num].team}` });
        } else {
          checks.push({ type: 'warning', msg: `? Companies House #${num} not in database — verify manually` });
        }
      });
    }

    // Check for known grade-F fabrications
    const fabChecks = [
      { pattern: /\$105M?|105 million|£105M?/i, msg: 'Horner severance $105M is FABRICATED. Reported range: £52M-£80M-$100M. No official figure.' },
      { pattern: /Column 3.*(three teams|3 teams)|three teams.*Column 3/i, msg: 'V15 "three teams get Column 3" is STRUCTURALLY WRONG. Only Ferrari gets LST bonus; 4 teams get CCB; Williams has separate heritage.' },
      { pattern: /\$812M?|812 million|812M/i, msg: 'Mercedes 2024 $812M was Sportico valuation estimate, NOT filed revenue. Filed turnover was £636.025M (~$856M).' },
      { pattern: /1,?200 (staff|employees)/i, msg: 'Mercedes staff 1,200 is WRONG. Actual 2023 avg headcount: 1,289.' },
      { pattern: /Zak Brown.*Team Principal|Team Principal.*Zak Brown/i, msg: 'Zak Brown is CEO of McLaren Racing. Andrea Stella is Team Principal. Distinct roles.' },
      { pattern: /Mercedes.*currently second|Mercedes.*P2|second.*Mercedes/i, msg: 'Mercedes finished P4 in 2024 Constructors\' (first time outside top 3 since 2012). Not second.' }
    ];
    fabChecks.forEach(f => {
      if (f.pattern.test(text)) {
        checks.push({ type: 'error', msg: `✗ ${f.msg}` });
      }
    });

    // Check for unsupported numerical claims (rough detection)
    const numbers = text.match(/\$[\d,.]+(M|B|billion|million)?|\£[\d,.]+(M|B|billion|million)?/g) || [];
    if (numbers.length > 0 && !/companies house|sec|fia|filing|filed|source|per /i.test(text)) {
      checks.push({ type: 'warning', msg: `⚠ Found ${numbers.length} numerical claim${numbers.length > 1 ? 's' : ''} but no source language. Every number needs attribution.` });
    }

    // Check for FIA article references
    const artMatch = text.match(/Article (\d+)(?:\.(\d+))?/gi);
    if (artMatch) {
      artMatch.forEach(m => {
        const numMatch = m.match(/Article (\d+)/i);

          checks.push({ type: 'success', msg: `✓ ${m} = ${titles[n]} (Section D Issue 04)` });
        }
      });
    }

    // Check for specific 2026 facts
    if (/Alpine.*Mercedes|Mercedes.*Alpine/.test(text) && /2026/.test(text)) {
      checks.push({ type: 'success', msg: '✓ Alpine joining Mercedes HPP 2026 is correct — Renault closing Viry, Alpine switches to Mercedes.' });

    if (checks.length === 0) {
      checks.push({ type: 'info', msg: 'No issues detected and no verifiable sources present. Paste text with specific numbers and filing references for a fuller check.' });

  };

  return React.createElement('div', null,

function PredictionsTracker() {
  const [predictions, setPredictions] = useState(() => {
    try {
      const saved = localStorage.getItem('v16_predictions');
      return saved ? JSON.parse(saved) : [];
    } catch (e) { return []; }
  });
  const [newPrediction, setNewPrediction] = useState({ claim: '', resolveBy: '', confidence: 70 });

  const savePredictions = (p) => {
    setPredictions(p);
    try { localStorage.setItem('v16_predictions', JSON.stringify(p)); } catch (e) {}
  };

  const addPrediction = () => {
    if (!newPrediction.claim || !newPrediction.resolveBy) return;
    const p = [...predictions, { ...newPrediction, id: Date.now(), created: new Date().toISOString(), status: 'open' }];
    savePredictions(p);
    setNewPrediction({ claim: '', resolveBy: '', confidence: 70 });
  };

  const resolvePrediction = (id, outcome) => {
    const p = predictions.map(x => x.id === id ? { ...x, status: outcome, resolvedOn: new Date().toISOString() } : x);
    savePredictions(p);
  };

  const today = new Date();
  const open = predictions.filter(p => p.status === 'open');
  const overdue = open.filter(p => new Date(p.resolveBy) < today);
  const upcoming = open.filter(p => new Date(p.resolveBy) >= today);
  const resolved = predictions.filter(p => p.status !== 'open');

  return React.createElement('div', null,
    React.createElement(SectionHeader, {
      eyebrow: 'Calibration Tool',
      title: 'Predictions Tracker',
      subtitle: 'Make specific, date-bounded predictions. Track which you get right. Calibrate yourself before the Graduate Programme interviews.'
    }),

    React.createElement(InfoBanner, { type: 'info', title: 'Why this matters' },
      'Real finance analysts are calibrated. They know their 70% predictions come true 70% of the time. This tracker flags overdue predictions so you resolve them honestly, rather than forgetting the ones you got wrong.'
    ),

    React.createElement(Card, { title: 'Add prediction' },
      React.createElement('div', { className: 'space-y-3' },
        React.createElement('input', {
          type: 'text',
          value: newPrediction.claim,
          onChange: (e) => setNewPrediction({ ...newPrediction, claim: e.target.value }),
          placeholder: 'e.g., "Mercedes will finish top-3 in 2026 Constructors"',
          className: 'w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm text-slate-200'
        }),
        React.createElement('div', { className: 'grid grid-cols-2 gap-3' },
          React.createElement('div', null,
            React.createElement('label', { className: 'text-xs text-slate-400 block mb-1' }, 'Resolve by'),
            React.createElement('input', {
              type: 'date',
              value: newPrediction.resolveBy,
              onChange: (e) => setNewPrediction({ ...newPrediction, resolveBy: e.target.value }),
              className: 'w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm text-slate-200'
            })
          ),
          React.createElement('div', null,
            React.createElement('label', { className: 'text-xs text-slate-400 block mb-1' }, `Confidence: ${newPrediction.confidence}%`),
            React.createElement('input', {
              type: 'range',
              min: 50, max: 99, step: 1,
              value: newPrediction.confidence,
              onChange: (e) => setNewPrediction({ ...newPrediction, confidence: parseInt(e.target.value) }),
              className: 'w-full accent-teal-400'
            })
          )
        ),
        React.createElement('button', {
          onClick: addPrediction,
          className: 'px-4 py-2 bg-teal-500 hover:bg-teal-400 text-slate-950 text-sm font-semibold rounded'
        }, 'Add')
      )
    ),

    // Overdue
    overdue.length > 0 && React.createElement('div', { className: 'mt-6' },
      React.createElement('div', { className: 'text-[10px] uppercase tracking-wider text-red-400 font-semibold mb-2' },
        `Overdue (${overdue.length}) — resolve honestly`),
      React.createElement('div', { className: 'space-y-2' },
        ...overdue.map(p => React.createElement(PredictionCard, {
          key: p.id, prediction: p, onResolve: resolvePrediction, isOverdue: true
        }))
      )
    ),

    // Upcoming
    upcoming.length > 0 && React.createElement('div', { className: 'mt-6' },
      React.createElement('div', { className: 'text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-2' },
        `Open (${upcoming.length})`),
      React.createElement('div', { className: 'space-y-2' },
        ...upcoming.map(p => React.createElement(PredictionCard, {
          key: p.id, prediction: p, onResolve: resolvePrediction
        }))
      )
    ),

    // Resolved
    resolved.length > 0 && React.createElement('div', { className: 'mt-6' },
      React.createElement('div', { className: 'text-[10px] uppercase tracking-wider text-slate-500 font-semibold mb-2' },
        `Resolved (${resolved.length})`),
      React.createElement('div', { className: 'space-y-2' },
        ...resolved.map(p => React.createElement(PredictionCard, {
          key: p.id, prediction: p, resolved: true

// Progress storage
const PROGRESS_KEY = 'v17_lesson_progress';

function getProgress() {
  try {
    const saved = localStorage.getItem(PROGRESS_KEY);
    return saved ? JSON.parse(saved) : { completed: {}, quizScores: {}, glossaryUnlocked: [] };
  } catch (e) {
    return { completed: {}, quizScores: {}, glossaryUnlocked: [] };
  }
}

function saveProgress(p) {
  try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch (e) {}
}

function markComplete(lessonId, quizScore) {
  const p = getProgress();
  p.completed[lessonId] = {
    completedAt: new Date().toISOString(),
    quizScore: quizScore
  };
  p.quizScores[lessonId] = quizScore;
  saveProgress(p);
  return p;
}

function isUnlocked(lesson, progress) {
  if (!lesson.prerequisites || lesson.prerequisites.length === 0) return true;
  return lesson.prerequisites.every(prereq => progress.completed[prereq]);
}

function isCompleted(lessonId, progress) {
  return !!progress.completed[lessonId];
}

function LessonViewer({ lesson, onComplete, onBack, onNavigate }) {
  const [currentStep, setCurrentStep] = useState('read'); // 'read' | 'quiz' | 'done'
  const [quizAnswers, setQuizAnswers] = useState({});
  const [quizSubmitted, setQuizSubmitted] = useState(false);
  const [showGlossary, setShowGlossary] = useState(false);

  const answerQuiz = (qIdx, optionIdx) => {
    if (quizSubmitted) return;
    setQuizAnswers({ ...quizAnswers, [qIdx]: optionIdx });
  };

  const submitQuiz = () => {
    setQuizSubmitted(true);
  };

  const quizScore = useMemo(() => {
    if (!quizSubmitted || !lesson.quiz) return 0;
    let correct = 0;
    lesson.quiz.forEach((q, i) => {
      if (quizAnswers[i] === q.correct) correct++;
    });
    return Math.round((correct / lesson.quiz.length) * 100);
  }, [quizSubmitted, quizAnswers, lesson]);

  const allAnswered = lesson.quiz && Object.keys(quizAnswers).length === lesson.quiz.length;

  const finishLesson = () => {
    onComplete(lesson.id, quizScore);
    setCurrentStep('done');
  };

  return React.createElement('div', { className: 'max-w-3xl mx-auto' },
    // Back button + progress header
    React.createElement('div', { className: 'flex items-center justify-between mb-6' },
      React.createElement('button', {
        onClick: onBack,
        className: 'text-sm text-slate-400 hover:text-slate-200 flex items-center gap-2'

// Body renderer — handles paragraphs with inline bold terms
function LessonBody({ body, italic }) {
  // Split into paragraphs
  const paragraphs = body.split('\n\n');
  return React.createElement('div', {
    className: `text-sm leading-relaxed space-y-3 ${italic ? 'italic text-slate-300' : 'text-slate-200'}`
  },
    ...paragraphs.map((para, i) => {
      // Simple inline formatting: **bold**, *italic*, `code`
      const parts = [];
      let remaining = para;
      let key = 0;
      while (remaining.length > 0) {
        const boldMatch = remaining.match(/\*\*(.+?)\*\*/);
        const codeMatch = remaining.match(/`(.+?)`/);
        const firstMatch = [boldMatch, codeMatch].filter(Boolean).sort((a, b) => a.index - b.index)[0];
        if (!firstMatch) {
          parts.push(remaining);
          break;
        }
        if (firstMatch.index > 0) {
          parts.push(remaining.substring(0, firstMatch.index));
        }
        if (firstMatch === boldMatch) {
          parts.push(React.createElement('strong', { key: key++, className: 'text-slate-100 font-semibold' }, boldMatch[1]));
        } else {
          parts.push(React.createElement('code', {
            key: key++,
            className: 'bg-slate-800 px-1.5 py-0.5 rounded text-xs text-teal-300 font-mono'
          }, codeMatch[1]));
        }
        remaining = remaining.substring(firstMatch.index + firstMatch[0].length);
      }
      return React.createElement('p', { key: i }, ...parts);
    })
  );
}

function QuizQuestion({ question, qIdx, selected, submitted, onAnswer }) {
  return React.createElement('div', {

    ),
    React.createElement('div', { className: 'space-y-2 ml-10' },
      ...question.options.map((opt, optIdx) => {
        const isSelected = selected === optIdx;
        const isCorrect = question.correct === optIdx;
        let classes = 'w-full text-left px-4 py-3 rounded-md border text-sm transition-colors ';
        if (submitted) {
          if (isCorrect) classes += 'bg-emerald-500/15 border-emerald-500/50 text-emerald-200';
          else if (isSelected) classes += 'bg-red-500/15 border-red-500/50 text-red-200';
          else classes += 'bg-slate-900/40 border-slate-800 text-slate-400';
        } else {
          if (isSelected) classes += 'bg-teal-500/15 border-teal-500/50 text-teal-200';
          else classes += 'bg-slate-900/40 border-slate-800 text-slate-300 hover:border-slate-700';
        }
        return React.createElement('button', {
          key: optIdx,
          onClick: () => onAnswer(qIdx, optIdx),
          disabled: submitted,
          className: classes
        },
          React.createElement('span', { className: 'font-semibold text-slate-400 mr-3' }, String.fromCharCode(65 + optIdx)),
          opt,
          submitted && isCorrect && React.createElement('span', { className: 'ml-2 text-emerald-400' }, '✓'),
          submitted && isSelected && !isCorrect && React.createElement('span', { className: 'ml-2 text-red-400' }, '✗')
        );
      })
    ),
    submitted && React.createElement('div', {
      className: 'mt-4 ml-10 bg-slate-950/60 border border-slate-800 rounded p-4 text-sm text-slate-300 leading-relaxed'
    },
      React.createElement('div', { className: 'text-xs uppercase tracking-wider text-teal-400 font-semibold mb-2' },
        selected === question.correct ? 'Correct — here\'s why' : 'Not quite — here\'s the reasoning'),
      question.explanation
    )
  );
}

function Classroom({ onNavigateToReference }) {
  const [progress, setProgress] = useState(() => getProgress());
  const [activeTrack, setActiveTrack] = useState(null);
  const [activeLesson, setActiveLesson] = useState(null);

  // When a lesson is completed, update progress state
  const handleComplete = (lessonId, score) => {
    const updated = markComplete(lessonId, score);
    setProgress(updated);
  };

  // Exit lesson back to track
  const handleBackToTrack = () => setActiveLesson(null);

  // If a lesson is active, render the lesson viewer
  if (activeLesson) {
    return React.createElement(LessonViewer, {
      lesson: activeLesson,
      onComplete: handleComplete,
      onBack: handleBackToTrack,
      onNavigate: onNavigateToReference
    });
  }

  // If a track is active, render the track view
  if (activeTrack) {
    return React.createElement(TrackView, {
      track: TRACKS[activeTrack],
      lessons: lessonsByTrack(activeTrack),
      progress,
      onSelectLesson: setActiveLesson,
      onBack: () => setActiveTrack(null)
    });
  }

  // Otherwise, render the classroom landing
  return React.createElement(ClassroomLanding, {
    progress,
    onSelectTrack: setActiveTrack
  });
}

// ============================================================================
// STORAGE FUNCTIONS
// ============================================================================

function getScenarios() {
  try {
    const saved = localStorage.getItem(SCENARIO_STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      // Merge: use stored scenarios, add any new seeded ones that weren't in storage
      const storedIds = new Set(parsed.map(s => s.id));
      const newSeeded = SEEDED_SCENARIOS.filter(s => !storedIds.has(s.id));
      return [...parsed, ...newSeeded];
    }
  } catch (e) {}
  return [...SEEDED_SCENARIOS];
}

function saveScenarios(scenarios) {
  try { localStorage.setItem(SCENARIO_STORAGE_KEY, JSON.stringify(scenarios)); } catch (e) {}
}

  const [activeScenario, setActiveScenario] = useState(null);
  const [filterCategory, setFilterCategory] = useState('All');

  const categories = ['All', ...Array.from(new Set(scenarios.map(s => s.category)))];

  const visible = filterCategory === 'All'
    ? scenarios
    : scenarios.filter(s => s.category === filterCategory);

  const openCount = scenarios.filter(s => s.status === 'open').length;
  const resolvedCount = scenarios.filter(s => s.status !== 'open').length;

  const markReviewed = (id) => {
    const updated = scenarios.map(s =>
      s.id === id ? { ...s, lastReviewed: new Date().toISOString().substring(0, 10) } : s
    );
    setScenarios(updated);
    saveScenarios(updated);
  };

  const resolveScenario = (id, outcome, note) => {
    const updated = scenarios.map(s =>
      s.id === id ? {
        ...s,
        status: outcome,
        resolutionNote: note,
        resolvedOn: new Date().toISOString().substring(0, 10)
      } : s
    );
    setScenarios(updated);
    saveScenarios(updated);
    setActiveScenario(null);
  };

  if (activeScenario) {
    return React.createElement(ScenarioDetail, {
      scenario: activeScenario,
      onBack: () => setActiveScenario(null),
      onMarkReviewed: markReviewed,
      onResolve: resolveScenario
    });
  }

  return React.createElement('div', null,
    React.createElement(SectionHeader, {
      eyebrow: 'Uncertainty Analysis',
      title: 'Scenario Register',
      subtitle: 'Structured analysis of major F1 uncertainties. Not prediction — preparedness. Each scenario gets reviewed weekly, resolved when it materializes, and serves as evidence of analytical discipline.'
    }),

    React.createElement(InfoBanner, { type: 'mercedes', title: 'Why this exists' },
      'A Mercedes Graduate Programme interviewer cannot test whether you memorized today\'s facts — every candidate has. They will test whether you can reason about what might change. This register is where that reasoning lives. Each scenario follows the same disciplined structure: trigger conditions, mechanisms, parties affected, second-order effects, analyst view. You review it weekly. When a scenario resolves, you mark it and reflect on whether your analysis was right. By 2029 this becomes your single most defensible application artifact.'
    ),

    React.createElement('div', { className: 'grid grid-cols-2 gap-3 mb-6' },
      React.createElement(StatTile, {
        label: 'Open Scenarios',
        value: openCount,
        caption: 'Actively tracked uncertainties'
      }),
      React.createElement(StatTile, {
        label: 'Resolved',
        value: resolvedCount,
        caption: 'Scenarios that have materialized or been ruled out'
      })
    ),

    // Category filter
    React.createElement('div', { className: 'flex flex-wrap gap-2 mb-4' },
      ...categories.map(cat => React.createElement('button', {
        key: cat,
        onClick: () => setFilterCategory(cat),
        className: `px-3 py-1.5 rounded-md text-xs font-semibold transition-colors ${
          filterCategory === cat
            ? 'bg-teal-500/20 text-teal-300 border border-teal-500/40'
            : 'bg-slate-800 text-slate-400 border border-slate-700 hover:border-slate-600'
        }`
      }, cat))
    ),

    // Scenario cards
    React.createElement('div', { className: 'space-y-3' },
      ...visible.map(s => React.createElement(ScenarioCard, {
        key: s.id,
        scenario: s,
        onOpen: () => setActiveScenario(s)
      }))
    )
  );
}

function ScenarioCard({ scenario, onOpen }) {
  const today = new Date();
  const lastReview = new Date(scenario.lastReviewed);
  const daysSinceReview = Math.floor((today - lastReview) / (1000 * 60 * 60 * 24));
  const stale = daysSinceReview > 14;

  return React.createElement('button', {
    onClick: onOpen,
    className: `w-full text-left bg-slate-900/40 border rounded-lg p-4 hover:border-slate-700 transition-colors ${
      scenario.status !== 'open' ? 'border-slate-800/50 opacity-75' : 'border-slate-800'
    }`
  },
    React.createElement('div', { className: 'flex items-center justify-between mb-2' },
      React.createElement('div', {
        className: 'text-[10px] uppercase tracking-wider font-semibold px-2 py-0.5 bg-slate-800 text-slate-400 rounded'
      }, scenario.category),
      React.createElement('div', { className: 'flex items-center gap-2' },
        stale && scenario.status === 'open' && React.createElement('div', {
          className: 'text-[10px] uppercase tracking-wider font-semibold px-2 py-0.5 bg-amber-500/20 text-amber-300 rounded'
        }, 'Needs review'),
        scenario.status !== 'open' && React.createElement('div', {
          className: 'text-[10px] uppercase tracking-wider font-semibold px-2 py-0.5 bg-slate-700 text-slate-400 rounded'
        }, scenario.status)
      )
    ),
    React.createElement('div', { className: 'font-semibold text-slate-100 mb-1' }, scenario.title),
    React.createElement('div', { className: 'text-xs text-slate-500' },
      scenario.lastReviewed
        ? `Last reviewed ${scenario.lastReviewed}${stale && scenario.status === 'open' ? ` (${daysSinceReview} days ago)` : ''}`
        : 'Never reviewed')
  );
}

function ScenarioDetail({ scenario, onBack, onMarkReviewed, onResolve }) {
  const [showResolve, setShowResolve] = useState(false);
  const [resolveOutcome, setResolveOutcome] = useState('materialized');
  const [resolveNote, setResolveNote] = useState('');

  return React.createElement('div', null,
    React.createElement('button', {
      onClick: onBack,
      className: 'text-sm text-slate-400 hover:text-slate-200 mb-4 flex items-center gap-2'
    }, '← Back to register'),

    React.createElement('div', { className: 'mb-6' },
      React.createElement('div', { className: 'text-[10px] uppercase tracking-wider text-teal-400 font-semibold mb-2' },
        scenario.category + ' Scenario'),
      React.createElement('h1', { className: 'text-2xl font-bold text-slate-100 mb-2' }, scenario.title),
      React.createElement('div', { className: 'text-xs text-slate-500' },
        'Created ' + scenario.dateCreated + ' • Last reviewed ' + scenario.lastReviewed +
        (scenario.status !== 'open' ? ' • Resolved ' + scenario.resolvedOn : ''))
    ),

    scenario.status !== 'open' && scenario.resolutionNote && React.createElement(InfoBanner, {
      type: 'success',
      title: 'Resolution: ' + scenario.status
    }, scenario.resolutionNote),

    React.createElement('div', { className: 'space-y-4' },
      React.createElement(ScenarioSection, {
        label: 'Trigger Conditions',
        body: scenario.triggerConditions,
        caption: 'What events would indicate this scenario is materializing'
      }),
      React.createElement(ScenarioSection, {
        label: 'Evidence',
        body: scenario.evidence,
        caption: 'Primary-source basis for why this scenario warrants tracking'
      }),
      React.createElement(ScenarioSectionList, {
        label: 'Mechanisms',
        items: scenario.mechanisms,
        caption: 'How the scenario would transmit through the business'
      }),
      React.createElement(ScenarioSectionList, {
        label: 'Parties Affected',
        items: scenario.partiesAffected,
        caption: 'Who experiences the consequences'
      }),
      React.createElement(ScenarioSection, {
        label: 'Second-Order Effects',
        body: scenario.secondOrderEffects,
        caption: 'Downstream consequences beyond the immediate mechanisms'
      }),
      React.createElement(ScenarioSection, {
        label: 'Analyst View',
        body: scenario.analystView,
        caption: 'Your structured assessment — probability, reasoning, and thesis implications',
        accent: TOKENS.gold
      })
    ),

    // Actions
    scenario.status === 'open' && React.createElement('div', { className: 'mt-8 flex flex-wrap gap-3' },
      React.createElement('button', {
        onClick: () => onMarkReviewed(scenario.id),
        className: 'px-4 py-2 bg-teal-500/15 hover:bg-teal-500/25 text-teal-300 border border-teal-500/30 text-sm font-semibold rounded-md'
      }, 'Mark reviewed today'),
      React.createElement('button', {
        onClick: () => setShowResolve(!showResolve),
        className: 'px-4 py-2 bg-amber-500/15 hover:bg-amber-500/25 text-amber-300 border border-amber-500/30 text-sm font-semibold rounded-md'
      }, 'Resolve scenario')
    ),

    showResolve && React.createElement('div', { className: 'mt-4 bg-slate-900/60 border border-amber-500/30 rounded-lg p-4' },
      React.createElement('h3', { className: 'text-sm font-semibold text-slate-100 mb-3' }, 'Resolve this scenario'),
      React.createElement('div', { className: 'mb-3' },
        React.createElement('label', { className: 'text-xs text-slate-400 block mb-1' }, 'Outcome'),
        React.createElement('select', {
          value: resolveOutcome,
          onChange: (e) => setResolveOutcome(e.target.value),
          className: 'w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm text-slate-200'
        },
          React.createElement('option', { value: 'materialized' }, 'Materialized — scenario happened'),
          React.createElement('option', { value: 'ruled out' }, 'Ruled out — scenario no longer relevant'),
          React.createElement('option', { value: 'superseded' }, 'Superseded — replaced by new scenario')
        )
      ),
      React.createElement('div', { className: 'mb-3' },
        React.createElement('label', { className: 'text-xs text-slate-400 block mb-1' }, 'Resolution note — what happened, how your analysis held up'),
        React.createElement('textarea', {
          value: resolveNote,
          onChange: (e) => setResolveNote(e.target.value),
          placeholder: 'Example: Dorilton announced sale to sovereign wealth fund at $2.3B in June 2027. Exit timing within predicted 50-70% range. Price landed above Sportico 2025 valuation, consistent with post-results premium.',
          className: 'w-full h-24 bg-slate-950 border border-slate-800 rounded p-2 text-sm text-slate-200 resize-none'
        })
      ),
      React.createElement('button', {
        onClick: () => onResolve(scenario.id, resolveOutcome, resolveNote),
        disabled: !resolveNote,
        className: `px-4 py-2 text-sm font-semibold rounded-md ${
          resolveNote
            ? 'bg-teal-500 hover:bg-teal-400 text-slate-950'
            : 'bg-slate-800 text-slate-500 cursor-not-allowed'
        }`
      }, 'Confirm resolution')
    )
  );
}

function ScenarioSection({ label, body, caption, accent }) {
  return React.createElement('div', {
    className: 'bg-slate-900/40 border border-slate-800 rounded-lg p-4',
    style: accent ? { borderLeftColor: accent, borderLeftWidth: '3px' } : {}
  },
    React.createElement('div', { className: 'text-[10px] uppercase tracking-wider font-semibold mb-1',
      style: { color: accent || '#9090A0' }
    }, label),
    caption && React.createElement('div', { className: 'text-xs text-slate-500 italic mb-2' }, caption),
    React.createElement('div', { className: 'text-sm text-slate-200 leading-relaxed' }, body)
  );
}

function ScenarioSectionList({ label, items, caption }) {
  return React.createElement('div', {
    className: 'bg-slate-900/40 border border-slate-800 rounded-lg p-4'
  },
    React.createElement('div', { className: 'text-[10px] uppercase tracking-wider font-semibold text-slate-400 mb-1' }, label),
    caption && React.createElement('div', { className: 'text-xs text-slate-500 italic mb-2' }, caption),
    React.createElement('ul', { className: 'space-y-1.5' },
      ...items.map((item, i) => React.createElement('li', {
        key: i,
        className: 'flex items-start gap-2 text-sm text-slate-200'
      },
        React.createElement('span', { className: 'text-teal-400 mt-0.5' }, '▸'),
        React.createElement('span', null, item)
      ))
    )
  );
}


</script>
</body>
</html>
